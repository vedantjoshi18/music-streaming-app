<div *ngIf="artist" class="space-y-8">
  <!-- Artist Header -->
  <div class="flex items-center gap-6">
    <div class="w-32 h-32 rounded-full overflow-hidden shadow-2xl">
      <img [src]="artist.imageUrl" [alt]="artist.name" class="w-full h-full object-cover" />
    </div>
    <div>
      <p class="text-xs text-white/50 uppercase tracking-wider">Artist</p>
      <h1 class="text-4xl font-bold mt-1">{{ artist.name }}</h1>
      <p class="text-sm text-white/60 mt-2 max-w-lg">{{ artist.bio }}</p>
    </div>
  </div>

  <!-- Songs -->
  <div class="space-y-1">
    <h2 class="text-xl font-semibold mb-4">Songs</h2>
    <div *ngFor="let song of artistSongs; let i = index"
         class="flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 transition-colors cursor-pointer"
         (click)="playSong(song)">
      <span class="w-8 text-center text-sm text-white/40">{{ i + 1 }}</span>
      <img [src]="song.coverUrl" [alt]="song.title" class="w-10 h-10 rounded-lg object-cover" />
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium truncate">{{ song.title }}</p>
        <p class="text-xs text-white/50">{{ song.genre }}</p>
      </div>
      <span class="text-xs text-white/40">{{ formatTime(song.duration) }}</span>
    </div>
  </div>
</div>

<div *ngIf="!artist" class="text-center py-20 text-white/40">
  <mat-icon class="text-6xl mb-4">person_off</mat-icon>
  <p class="text-lg">Artist not found</p>
</div>
