<div class="flex items-center justify-center min-h-[60vh]" @fadeIn>
  <div class="glass-dark rounded-3xl p-10 w-full max-w-md space-y-6 border border-white/[0.06]">
    <div class="text-center">
      <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center shadow-lg shadow-amber-500/20">
        <mat-icon class="!text-3xl text-black">music_note</mat-icon>
      </div>
      <h1 class="text-2xl font-bold">{{ isLogin ? 'Welcome Back' : 'Create Account' }}</h1>
      <p class="text-sm text-white/50 mt-1">{{ isLogin ? 'Sign in to Musico' : 'Join Musico today' }}</p>
    </div>

    <form (ngSubmit)="submit()" class="space-y-4">
      <input *ngIf="!isLogin" type="text" [(ngModel)]="name" name="name" placeholder="Full name"
             class="w-full px-5 py-3 rounded-xl bg-white/[0.04] text-white placeholder-white/30 border border-white/[0.06] outline-none focus:ring-2 focus:ring-amber-400/50 transition-all" />
      <input type="email" [(ngModel)]="email" name="email" placeholder="Email address"
             class="w-full px-5 py-3 rounded-xl bg-white/[0.04] text-white placeholder-white/30 border border-white/[0.06] outline-none focus:ring-2 focus:ring-amber-400/50 transition-all" />
      <input type="password" [(ngModel)]="password" name="password" placeholder="Password"
             class="w-full px-5 py-3 rounded-xl bg-white/[0.04] text-white placeholder-white/30 border border-white/[0.06] outline-none focus:ring-2 focus:ring-amber-400/50 transition-all" />
      <input *ngIf="!isLogin" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm password"
             class="w-full px-5 py-3 rounded-xl bg-white/[0.04] text-white placeholder-white/30 border border-white/[0.06] outline-none focus:ring-2 focus:ring-amber-400/50 transition-all" />

      <button type="submit" [disabled]="loading"
              class="w-full py-3 rounded-xl bg-gradient-to-r from-amber-400 to-orange-500 text-black font-semibold hover:from-amber-300 hover:to-orange-400 transition-all shadow-lg shadow-amber-500/20 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
        <mat-icon *ngIf="loading" class="animate-spin !text-xl">autorenew</mat-icon>
        {{ loading ? (isLogin ? 'Signing In...' : 'Creating Account...') : (isLogin ? 'Sign In' : 'Create Account') }}
      </button>
    </form>

    <div class="relative flex items-center gap-4">
      <div class="flex-1 h-px bg-white/10"></div>
      <span class="text-xs text-white/30">or</span>
      <div class="flex-1 h-px bg-white/10"></div>
    </div>

    <button type="button" (click)="continueAsGuest()"
            class="w-full py-3 rounded-xl bg-white/[0.04] border border-white/[0.06] text-white/70 font-medium hover:bg-white/[0.08] transition-all flex items-center justify-center gap-3">
      <mat-icon class="!text-xl">person</mat-icon>
      Continue as Guest
    </button>

    <p class="text-center text-sm text-white/50">
      {{ isLogin ? "Don't have an account?" : 'Already have an account?' }}
      <button type="button" (click)="toggleMode()" class="text-amber-400 hover:underline ml-1 font-medium">
        {{ isLogin ? 'Sign Up' : 'Sign In' }}
      </button>
    </p>
  </div>
</div>
