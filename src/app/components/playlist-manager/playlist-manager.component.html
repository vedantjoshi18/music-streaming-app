<div class="max-w-4xl mx-auto space-y-8" @fadeIn>
  <h1 class="text-3xl font-bold mt-4 tracking-tight">Your Library</h1>

  <!-- Create Playlist Form -->
  <div class="glass-dark rounded-2xl p-8 space-y-5 border border-white/[0.06]">
    <h2 class="text-lg font-bold text-primary">Create New Playlist</h2>
    <div class="flex flex-col md:flex-row gap-4">
      <input type="text" [(ngModel)]="newPlaylistName" placeholder="Playlist name"
             class="flex-1 px-5 py-3 rounded-xl bg-white/[0.04] text-white text-sm placeholder-white/30 border border-white/[0.06] outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary/30 transition-all" />
      <input type="text" [(ngModel)]="newPlaylistDesc" placeholder="Description (optional)"
             class="flex-1 px-5 py-3 rounded-xl bg-white/[0.04] text-white text-sm placeholder-white/30 border border-white/[0.06] outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary/30 transition-all" />
      <button (click)="createPlaylist()"
              class="px-8 py-3 rounded-xl bg-primary text-black font-bold text-sm hover:bg-yellow-400 transition-all hover:shadow-lg hover:shadow-primary/25 whitespace-nowrap flex items-center justify-center gap-1">
        <mat-icon class="icon-sm">add</mat-icon> Create
      </button>
    </div>
  </div>

  <!-- Playlist Grid -->
  <div *ngIf="playlists.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <div *ngFor="let pl of playlists" class="glass-dark rounded-2xl p-6 space-y-3 group border border-white/[0.06] hover:border-white/[0.12] transition-all">
      <div class="flex items-start justify-between">
        <div>
          <h3 class="text-base font-bold">{{ pl.name }}</h3>
          <p class="text-sm text-white/40 font-medium">{{ pl.description || 'No description' }}</p>
        </div>
        <button mat-icon-button (click)="deletePlaylist(pl.id)" class="text-red-400/70 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
          <mat-icon class="icon-sm">delete_outline</mat-icon>
        </button>
      </div>
      <div class="flex items-center gap-2 text-xs text-white/30 font-medium">
        <mat-icon class="icon-sm">music_note</mat-icon>
        <span>{{ pl.songIds.length }} songs</span>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="playlists.length === 0" class="text-center py-24 text-white/30">
    <mat-icon class="icon-2xl mb-4">library_music</mat-icon>
    <p class="text-xl font-semibold">No playlists yet</p>
    <p class="text-sm mt-2 text-white/20">Create your first playlist above</p>
  </div>
</div>
