<div *ngIf="currentSong" class="glass-dark border-t border-white/[0.06] px-4 py-2.5">
  <div class="max-w-7xl mx-auto flex items-center gap-4">
    <!-- Song Info -->
    <div class="flex items-center gap-3 w-1/4 min-w-0">
      <img [src]="currentSong.coverUrl" [alt]="currentSong.title" class="w-14 h-14 rounded-xl object-cover shadow-lg shadow-black/30 ring-1 ring-white/[0.06]" />
      <div class="min-w-0">
        <p class="text-sm font-bold truncate">{{ currentSong.title }}</p>
        <p class="text-[11px] text-white/40 font-medium">{{ currentSong.genre }}</p>
      </div>
      <button mat-icon-button (click)="toggleFavorite()" class="ml-1">
        <mat-icon [class.text-red-500]="isFavorite()" class="icon-sm">
          {{ isFavorite() ? 'favorite' : 'favorite_border' }}
        </mat-icon>
      </button>
    </div>

    <!-- Controls -->
    <div class="flex-1 flex flex-col items-center gap-1.5">
      <div class="flex items-center gap-2">
        <button mat-icon-button (click)="toggleShuffle()" [class.text-primary]="shuffleActive" class="text-white/40 hover:text-white transition-colors">
          <mat-icon class="icon-sm">shuffle</mat-icon>
        </button>
        <button mat-icon-button (click)="previous()" class="text-white/70 hover:text-white transition-colors">
          <mat-icon class="icon-md">skip_previous</mat-icon>
        </button>
        <button mat-icon-button (click)="togglePlay()"
                class="!w-11 !h-11 rounded-full bg-primary text-black hover:bg-yellow-400 hover:scale-105 transition-all flex items-center justify-center shadow-lg shadow-primary/25">
          <mat-icon class="icon-lg">{{ state.playing ? 'pause' : 'play_arrow' }}</mat-icon>
        </button>
        <button mat-icon-button (click)="next()" class="text-white/70 hover:text-white transition-colors">
          <mat-icon class="icon-md">skip_next</mat-icon>
        </button>
        <button mat-icon-button (click)="toggleRepeat()" [class.text-primary]="repeatActive" class="text-white/40 hover:text-white transition-colors">
          <mat-icon class="icon-sm">repeat</mat-icon>
        </button>
      </div>
      <!-- Seek Bar -->
      <div class="flex items-center gap-2.5 w-full max-w-xl">
        <span class="text-[10px] text-white/40 w-10 text-right font-medium tabular-nums">{{ state.readableCurrentTime }}</span>
        <input type="range" min="0" [max]="state.duration || 0" [value]="state.currentTime || 0"
               (input)="onSeek($event)"
               class="flex-1 h-1" />
        <span class="text-[10px] text-white/40 w-10 font-medium tabular-nums">{{ state.readableDuration }}</span>
      </div>
    </div>

    <!-- Volume -->
    <div class="hidden md:flex items-center gap-2 w-1/6 justify-end">
      <button mat-icon-button (click)="toggleMute()" class="text-white/40 hover:text-white transition-colors">
        <mat-icon class="icon-sm">{{ getVolumeIcon() }}</mat-icon>
      </button>
      <input type="range" min="0" max="1" step="0.01" [value]="state.volume || 0"
             (input)="onVolumeChange($event)"
             class="w-24 h-1" />
    </div>
  </div>
</div>
