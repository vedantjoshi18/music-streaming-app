<div class="immersive-3d min-h-screen mesh-bg text-white relative overflow-x-hidden">
  <!-- Immersive 3D scene layers -->
  <div class="immersive-scene z-0">
    <div class="immersive-layer bg-deep"></div>
    <div class="immersive-layer bg-mid"></div>
    <div class="immersive-layer bg-front"></div>
  </div>

  <!-- Floating background orbs -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-3xl animate-float-slow"></div>
    <div class="absolute bottom-1/3 right-1/4 w-80 h-80 bg-maroon-700/30 rounded-full blur-3xl animate-float-slower"></div>
    <div class="absolute top-1/2 left-1/2 w-72 h-72 bg-purple-900/20 rounded-full blur-3xl animate-float-medium"></div>
    <div class="absolute bottom-1/4 left-1/3 w-64 h-64 bg-primary/10 rounded-full blur-3xl animate-float-reverse"></div>
  </div>

  <!-- Desktop Navbar -->
  <app-navbar class="hidden md:flex fixed top-4 left-1/2 -translate-x-1/2 z-50"></app-navbar>

  <!-- Main Content -->
  <main class="relative z-10 pt-24 pb-36 md:pb-24 px-4 md:px-8 max-w-7xl mx-auto">
    <router-outlet></router-outlet>
  </main>

  <!-- Song Player -->
  <app-song-player class="fixed bottom-16 md:bottom-0 left-0 right-0 z-40"></app-song-player>

  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 glass-dark border-t border-white/[0.06] h-16 flex items-center justify-around px-4">
    <a routerLink="/songs" routerLinkActive="text-primary" class="flex flex-col items-center gap-0.5 text-white/40 transition-colors">
      <mat-icon class="icon-md">home</mat-icon>
      <span class="text-[10px] font-semibold">Home</span>
    </a>
    <a routerLink="/artists" routerLinkActive="text-primary" class="flex flex-col items-center gap-0.5 text-white/40 transition-colors">
      <mat-icon class="icon-md">explore</mat-icon>
      <span class="text-[10px] font-semibold">Browse</span>
    </a>
    <a routerLink="/playlists" routerLinkActive="text-primary" class="flex flex-col items-center gap-0.5 text-white/40 transition-colors">
      <mat-icon class="icon-md">library_music</mat-icon>
      <span class="text-[10px] font-semibold">Library</span>
    </a>
    <a routerLink="/liked" routerLinkActive="text-primary" class="flex flex-col items-center gap-0.5 text-white/40 transition-colors">
      <mat-icon class="icon-md">favorite</mat-icon>
      <span class="text-[10px] font-semibold">Liked</span>
    </a>
  </nav>
</div>
